<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AK.ANIME | Premium Experience</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
       :root {
            --bg-main: #ffffff; 
            --glass-bg: #f8f9fa; 
            --accent-primary: #7d5fff;
            --text-main: #2d3436;
            --card-title: #1e272e;
            --card-text: #636e72;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-main: #0f172a; 
            --glass-bg: rgba(30, 39, 46, 0.7);
            --text-main: #f1f2f6;
            --card-title: #ffffff;
            --card-text: #ced6e0;
            --nav-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        
        .navbar {
            background: var(--nav-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 1.5rem;
            background: linear-gradient(to right, #fff, #a29bfe);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        
        .hero-section {
            padding: 80px 0 40px;
            text-align: center;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        
        .anime-card {
            border: 1px solid var(--border-color);
            background: var(--glass-bg);
            border-radius: 24px;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            overflow: hidden;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .img-container {
            position: relative;
            margin: 10px;
            border-radius: 18px;
            overflow: hidden;
            height: 320px;
        }

        .anime-img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        .score-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: 800;
            color: var(--accent-primary);
            font-size: 0.75rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card-body {
            padding: 1rem 1.2rem 1.5rem;
        }

        .anime-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--card-title);
            margin-bottom: 8px;
        }

        .synopsis {
            font-size: 0.85rem;
            color: var(--card-text);
            line-height: 1.5;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 12px;
            background: var(--accent-primary);
            border: none;
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .theme-toggle:hover {
            opacity: 0.9;
        }

        .btn-view {
            background: var(--accent-primary);
            color: white;
            border-radius: 12px;
            padding: 10px;
            text-decoration: none;
            display: block;
            text-align: center;
            font-weight: 600;
            margin-top: 15px;
            transition: filter 0.2s;
        }

        .btn-view:hover {
            color: white;
            filter: brightness(1.1);
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            height: 100%;
            border-radius: 20px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
    </style>
</head>

<body>

    <nav class="navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">AK.ANIME</a>
            <button id="theme-switcher" class="theme-toggle">Dark Mode</button>
            <div class="d-none d-md-block">
                <span class="badge rounded-pill bg-light text-dark py-2 px-3">
                    ✨ Seasonal Spotlight 2026
                </span>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="hero-title">Experience Anime<br>Like Never Before.</h1>
            <p class="opacity-75 lead">Curated seasonal releases with premium details.</p>
        </div>
    </header>

    <main class="container pb-5">
        <div id="anime-list" class="row row-cols-1 row-cols-md-2 row-cols-xl-4 g-5">
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
        </div>
    </main>

    <script>

        const themeBtn = document.getElementById('theme-switcher');
        
        
        const updateBtnText = (theme) => {
            themeBtn.innerHTML = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
        };

       
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateBtnText(savedTheme);

        
        themeBtn.addEventListener('click', () => {
            let current = document.documentElement.getAttribute('data-theme');
            let newTheme = current === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateBtnText(newTheme);
        });

        async function fetchAnime() {
            try {
                const response = await fetch('https://api.jikan.moe/v4/seasons/now?limit=12');
                const result = await response.json();
                if(result.data) {
                    renderCards(result.data);
                }
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('anime-list').innerHTML = `<div class="col-12 text-center text-white">Something went wrong. Please refresh.</div>`;
            }
        }

        function renderCards(animes) {
            const container = document.getElementById('anime-list');
            container.innerHTML = ''; 

            animes.forEach((anime, index) => {
                const card = document.createElement('div');
                card.className = 'col';
                card.style.animation = `fadeInUp 0.6s ease forwards ${index * 0.1}s`;
                card.style.opacity = '0';
                
                card.innerHTML = `
                    <div class="card anime-card">
                        <div class="img-container">
                            <div class="score-tag">★ ${anime.score || 'N/A'}</div>
                            <div class="type-tag">${anime.type}</div>
                            <img src="${anime.images.webp.large_image_url}" class="anime-img w-100" alt="${anime.title}" loading="lazy">
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="anime-title text-truncate-2">${anime.title}</h5>
                            <p class="synopsis" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${anime.synopsis || 'No synopsis available for this title.'}
                            </p>
                            <div class="mt-auto">
                                <a href="${anime.url}" target="_blank" class="btn btn-view w-100">
                                    View Details
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                      <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        
        const styleSheet = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .text-truncate-2 {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                height: 3.2rem;
            }
        `;
        document.head.appendChild(styleSheet);

        window.onload = fetchAnime;
    </script>
</body>
</html>
