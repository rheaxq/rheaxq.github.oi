<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AK.ANIME | Premium Experience</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.65);
            --accent-primary: #7d5fff;
            --accent-secondary: #ff4dff;
            --soft-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            --card-radius: 28px;
        }

        body {
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            font-family: 'Outfit', sans-serif;
            color: #2d3436;
            overflow-x: hidden;
        }

        /* --- Custom Navigation --- */
        .navbar {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem 0;
            transition: all 0.3s;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 1.5rem;
            background: linear-gradient(to right, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Hero Section --- */
        .hero-section {
            padding: 100px 0 60px;
            text-align: center;
            color: white;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- Glass Card Design --- */
        .anime-card {
            border: none;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: var(--card-radius);
            height: 100%;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-20px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.9);
        }

        .img-container {
            position: relative;
            margin: 12px;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .anime-img {
            height: 350px;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .anime-card:hover .anime-img {
            transform: scale(1.15);
        }

        /* --- Floating Badges --- */
        .score-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 14px;
            border-radius: 14px;
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 0.9rem;
            z-index: 2;
        }

        .type-tag {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: var(--accent-primary);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-body {
            padding: 1.5rem 1.8rem 1.8rem;
        }

        .anime-title {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #1e272e;
        }

        .synopsis {
            font-size: 0.9rem;
            color: #57606f;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* --- Premium Button --- */
        .btn-view {
            background: #1e272e;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-view:hover {
            background: var(--accent-primary);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(125, 95, 255, 0.3);
        }

        /* --- Skeleton Loader --- */
        .skeleton {
            background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 15px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive Tweaks */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .anime-img { height: 280px; }
        }
    </style>
</head>

<body>

    <nav class="navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">AK.ANIME</a>
            <div class="d-none d-md-block">
                <span class="badge rounded-pill bg-light text-dark py-2 px-3">
                    ✨ Seasonal Spotlight 2026
                </span>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="container">
            <h1 class="hero-title">Experience Anime<br>Like Never Before.</h1>
            <p class="opacity-75 lead">Curated seasonal releases with premium details.</p>
        </div>
    </header>

    <main class="container pb-5">
        <div id="anime-list" class="row row-cols-1 row-cols-md-2 row-cols-xl-4 g-5">
            <!-- Loading Skeletons -->
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
            <div class="col"><div class="anime-card p-3"><div class="skeleton" style="height: 350px;"></div></div></div>
        </div>
    </main>

    <script>
        async function fetchAnime() {
            try {
                const response = await fetch('https://api.jikan.moe/v4/seasons/now?sfw');
                const result = await response.json();
                renderCards(result.data);
            } catch (error) {
                console.error("Fetch error:", error);
                document.getElementById('anime-list').innerHTML = `<div class="col-12 text-center text-white">Something went wrong. Please refresh.</div>`;
            }
        }

        function renderCards(animes) {
            const container = document.getElementById('anime-list');
            container.innerHTML = ''; // Clear skeletons

            animes.forEach((anime, index) => {
                const card = document.createElement('div');
                card.className = 'col';
                card.style.animation = `fadeInUp 0.6s ease forwards ${index * 0.1}s`;
                card.style.opacity = '0';
                
                card.innerHTML = `
                    <div class="card anime-card">
                        <div class="img-container">
                            <div class="score-tag">★ ${anime.score || 'N/A'}</div>
                            <div class="type-tag">${anime.type}</div>
                            <img src="${anime.images.webp.large_image_url}" class="anime-img w-100" alt="${anime.title}" loading="lazy">
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="anime-title text-truncate-2">${anime.title}</h5>
                            <p class="synopsis" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${anime.synopsis || 'No synopsis available for this title.'}
                            </p>
                            <div class="mt-auto">
                                <a href="${anime.url}" target="_blank" class="btn btn-view w-100">
                                    View Details
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                      <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // CSS Animation for cards
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .text-truncate-2 {
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                height: 3.2rem;
            }
        `;
        document.head.appendChild(style);

        window.onload = fetchAnime;
    </script>
</body>
</html>
